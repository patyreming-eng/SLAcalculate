<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA Severity Calculator (AOT Only)</title>
    <style>
        :root {
            --primary-color: #0b3d91; /* สีน้ำเงินเข้ม */
            --low-color: #2ecc71;
            --medium-color: #f1c40f;
            --high-color: #e67e22;
            --critical-color: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2, h3 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
        }
        .header-bar {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .calculator-section {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .form-group { grid-template-columns: 1fr; }
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #495057;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(11,61,145,0.2);
        }
        .result-box {
            text-align: center;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            display: none;
            transition: all 0.3s ease;
        }
        .result-title { font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .result-value { font-size: 28px; margin-bottom: 5px; }
        .resolution-time { 
            font-size: 20px; 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px dashed rgba(0,0,0,0.2); 
            color: #000;
        }
        
        .info-panel {
            background-color: #e3f2fd;
            border-left: 5px solid #1976d2;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }
        .info-panel h4 { margin-top: 0; color: #1565c0; margin-bottom: 10px;}
        .info-panel ul { margin: 0; padding-left: 20px; }
        
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">ระบบคำนวณเกณฑ์ SLA ท่าอากาศยานไทย (AOT Only)</div>
    
    <div class="calculator-section">
        <h3>โปรแกรมคำนวณระดับความรุนแรงและระยะเวลาแก้ไข (AOT)</h3>
        <div class="form-group">
            <div>
                <label for="systemSelect">1. เลือกระบบ (System):</label>
                <select id="systemSelect" onchange="updateSystemData()">
                    <option value="">-- กรุณาเลือกระบบ --</option>
                    <option value="CUTE">CUTE / CUPPS</option>
                    <option value="CUSS">CUSS</option>
                    <option value="CUBD">CUBD</option>
                    <option value="PVS">PVS</option>
                    <option value="SBG">SBG</option>
                    <option value="BIO">BIO</option>
                </select>
            </div>
            <div>
                <label for="totalEquip">2. จำนวนอุปกรณ์ทั้งหมด:</label>
                <input type="number" id="totalEquip" min="1" placeholder="ระบุจำนวนเครื่องทั้งหมด" oninput="calculateSLA()">
            </div>
            <div>
                <label for="brokenEquip">3. ใช้งานไม่ได้ (จำนวน):</label>
                <input type="number" id="brokenEquip" min="0" placeholder="ระบุจำนวนที่เสีย" oninput="calculateSLA()" disabled>
            </div>
        </div>

        <div id="systemInfoPanel" class="info-panel">
            <h4 id="infoTitle">อ้างอิงข้อตกลงระดับคุณภาพการให้บริการ AOT (SLA)</h4>
            <div id="infoDetails"></div>
        </div>
        
        <div id="resultBox" class="result-box">
            <div class="result-title" id="pctResult">สัดส่วนความเสียหาย: -</div>
            <div class="result-value" id="severityResult">ระดับ: -</div>
            <div id="descResult" style="font-size: 16px; margin-bottom: 10px;">กรุณากรอกข้อมูลให้ครบถ้วน</div>
            <div class="resolution-time" id="timeResult"></div>
        </div>
    </div>
</div>

<script>
// ฐานข้อมูลเกณฑ์ SLA แยกตามระบบ เฉพาะ AOT (อ้างอิงเอกสาร SKY-WI-OS-02 หน้า 16-23)
const slaData = {
    "CUTE": {
        defaultTotal: 36,
        times: { critical: "75 นาที (1 ชม. 15 นาที)", high: "2 ชม. 30 นาที", medium: "6 ชม. 30 นาที", low: "24 ชั่วโมง" },
        desc: `
            <ul>
                <li><b>Critical (≥75%):</b> CUTE System ทำงานไม่ได้ทั้งระบบ หรือทำงานไม่ได้มากกว่า 75% (ทุกสายการบินเช็คอินไม่ได้)</li>
                <li><b>High (>25% - <75%):</b> CUTE Terminal ทำงานไม่ได้มากกว่า 25% - 75% หรือ DC Server/Gateway ทำงานไม่ได้มากกว่า 50%</li>
                <li><b>Medium (5% - 25%):</b> CUTE Terminal ทำงานไม่ได้ตั้งแต่ 5% - 25% (บางส่วนยังทำงานได้)</li>
                <li><b>Low (<5%):</b> CUTE Terminal ทำงานไม่ได้น้อยกว่า 5% หรือตรวจพบอุปกรณ์ต่อพ่วงเสีย</li>
            </ul>`
    },
    "CUSS": {
        defaultTotal: 8,
        times: { critical: "3 ชั่วโมง", high: "6 ชั่วโมง", medium: "12 ชั่วโมง", low: "24 ชั่วโมง" },
        desc: `
            <ul>
                <li><b>Critical (≥75%):</b> CUSS Kiosk ทำงานไม่ได้มากกว่า 75% (ส่งผลกระทบรุนแรงต่อธุรกิจ)</li>
                <li><b>High (>25% - <75%):</b> CUSS Kiosk ทำงานไม่ได้มากกว่า 25% - 75%</li>
                <li><b>Medium (5% - 25%):</b> CUSS Kiosk ทำงานไม่ได้ตั้งแต่ 5% - 25% (กระทบความสะดวก ทำงานล่าช้า)</li>
                <li><b>Low (<5%):</b> ตรวจพบความผิดปกติ แต่ระบบยังคงทำงานได้ (น้อยกว่า 5%)</li>
            </ul>`
    },
    "CUBD": {
        defaultTotal: 2,
        times: { critical: "2 วัน", high: "3 วัน", medium: "5 วัน", low: "7 วัน" },
        desc: `
            <ul>
                <li><b>Critical (≥75%):</b> CUBD ทำงานไม่ได้มากกว่า 75% ส่งผลกระทบรุนแรง</li>
                <li><b>High (>25% - <75%):</b> CUBD ทำงานไม่ได้มากกว่า 25% - 75%</li>
                <li><b>Medium (5% - 25%):</b> CUBD ทำงานไม่ได้ตั้งแต่ 5% - 50% (อ้างอิงช่วง Medium จากเอกสาร)</li>
                <li><b>Low (<5%):</b> CUBD ทำงานไม่ได้น้อยกว่า 5%</li>
            </ul>`
    },
    "PVS": {
        defaultTotal: 4,
        times: { critical: "3 ชั่วโมง", high: "6 ชั่วโมง", medium: "12 ชั่วโมง", low: "24 ชั่วโมง" },
        desc: `
            <ul>
                <li><b>Critical (≥75%):</b> ระบบตรวจสอบยืนยันตัวตนผู้โดยสารทำงานไม่ได้มากกว่า 75%</li>
                <li><b>High (>25% - <75%):</b> ใช้งานไม่ได้มากกว่า 25% - 75%</li>
                <li><b>Medium (5% - 25%):</b> ใช้งานไม่ได้ตั้งแต่ 5% - 25% (ประสิทธิภาพต่ำลง)</li>
                <li><b>Low (<5%):</b> ตรวจพบความผิดปกติ แต่ระบบยังคงทำงานได้</li>
            </ul>`
    },
    "SBG": {
        defaultTotal: 12,
        times: { critical: "3 ชั่วโมง", high: "6 ชั่วโมง", medium: "12 ชั่วโมง", low: "24 ชั่วโมง" },
        desc: `
            <ul>
                <li><b>Critical (≥75%):</b> ระบบประตูทางออกขึ้นเครื่องอัตโนมัติทำงานไม่ได้มากกว่า 75%</li>
                <li><b>High (>25% - <75%):</b> ใช้งานไม่ได้มากกว่า 25% - 75%</li>
                <li><b>Medium (5% - 25%):</b> ใช้งานไม่ได้ตั้งแต่ 5% - 25%</li>
                <li><b>Low (<5%):</b> ตรวจพบความผิดปกติ แต่ระบบยังคงทำงานได้</li>
            </ul>`
    },
    "BIO": {
        defaultTotal: 62,
        times: { critical: "4 ชั่วโมง", high: "8 ชั่วโมง", medium: "24 ชั่วโมง", low: "48 ชั่วโมง" },
        desc: `
            <ul>
                <li><b>Critical (≥75%):</b> Automated Biometric System ทำงานไม่ได้มากกว่า 75%</li>
                <li><b>High (>25% - <75%):</b> ใช้งานไม่ได้มากกว่า 25% - 75%</li>
                <li><b>Medium (5% - 25%):</b> ใช้งานไม่ได้ตั้งแต่ 5% - 25%</li>
                <li><b>Low (<5%):</b> ตรวจพบความผิดปกติ แต่ระบบยังคงทำงานได้</li>
            </ul>`
    }
};

let currentSystem = "";

function updateSystemData() {
    const sysSelect = document.getElementById('systemSelect').value;
    const totalInput = document.getElementById('totalEquip');
    const brokenInput = document.getElementById('brokenEquip');
    const infoPanel = document.getElementById('systemInfoPanel');
    const infoDetails = document.getElementById('infoDetails');
    const infoTitle = document.getElementById('infoTitle');
    const resultBox = document.getElementById('resultBox');

    if (sysSelect && slaData[sysSelect]) {
        currentSystem = sysSelect;
        // เติมค่า Default ให้ แต่ผู้ใช้แก้ไขได้อิสระ
        totalInput.value = slaData[sysSelect].defaultTotal; 
        brokenInput.disabled = false;
        brokenInput.value = "";
        
        infoTitle.innerText = "อ้างอิง SLA ของระบบ : " + sysSelect + " (AOT)";
        infoDetails.innerHTML = slaData[sysSelect].desc;
        infoPanel.style.display = "block";
        resultBox.style.display = "none";
        calculateSLA();
    } else {
        currentSystem = "";
        totalInput.value = "";
        brokenInput.value = "";
        brokenInput.disabled = true;
        infoPanel.style.display = "none";
        resultBox.style.display = "none";
    }
}

function calculateSLA() {
    if (!currentSystem) return;

    const total = parseFloat(document.getElementById('totalEquip').value);
    const broken = parseFloat(document.getElementById('brokenEquip').value);
    const resultBox = document.getElementById('resultBox');
    const pctResult = document.getElementById('pctResult');
    const severityResult = document.getElementById('severityResult');
    const descResult = document.getElementById('descResult');
    const timeResult = document.getElementById('timeResult');
    const sysData = slaData[currentSystem];

    if (isNaN(total) || total <= 0 || isNaN(broken) || broken < 0) {
        resultBox.style.display = "none";
        return;
    }

    if (broken > total) {
        resultBox.style.display = "block";
        resultBox.style.backgroundColor = "#f8d7da";
        resultBox.style.color = "#721c24";
        pctResult.innerText = "เกิดข้อผิดพลาด";
        severityResult.innerText = "ข้อมูลไม่ถูกต้อง";
        descResult.innerText = "จำนวนเครื่องที่ใช้งานไม่ได้ ห้ามมากกว่าจำนวนเครื่องทั้งหมดครับ";
        timeResult.innerText = "";
        return;
    }

    // คำนวณเปอร์เซ็นต์
    const percentage = (broken / total) * 100;
    resultBox.style.display = "block";
    pctResult.innerText = `สัดส่วนความเสียหาย: ${percentage.toFixed(2)}% (${broken}/${total} เครื่อง)`;

    // วิเคราะห์ระดับตามเกณฑ์ % ของ AOT
    if (percentage >= 75) {
        resultBox.style.backgroundColor = "rgba(231, 76, 60, 0.2)";
        resultBox.style.color = "#c0392b";
        severityResult.innerText = "🔴 CRITICAL";
        descResult.innerText = "เสียหายวิกฤต (ตั้งแต่ 75% ขึ้นไป)";
        timeResult.innerHTML = `⏱️ <b>ระยะเวลาแก้ไขปัญหา (SLA):</b> <br><span style="font-size:32px;">${sysData.times.critical}</span>`;
    } else if (percentage > 25 && percentage < 75) {
        resultBox.style.backgroundColor = "rgba(230, 126, 34, 0.2)";
        resultBox.style.color = "#d35400";
        severityResult.innerText = "🟠 HIGH";
        descResult.innerText = "เสียหายรุนแรง (> 25% - < 75%)";
        timeResult.innerHTML = `⏱️ <b>ระยะเวลาแก้ไขปัญหา (SLA):</b> <br><span style="font-size:32px;">${sysData.times.high}</span>`;
    } else if (percentage >= 5 && percentage <= 25) {
        resultBox.style.backgroundColor = "rgba(241, 196, 15, 0.25)";
        resultBox.style.color = "#9a7d0a";
        severityResult.innerText = "🟡 MEDIUM";
        descResult.innerText = "เสียหายระดับปานกลาง (5% - 25%)";
        timeResult.innerHTML = `⏱️ <b>ระยะเวลาแก้ไขปัญหา (SLA):</b> <br><span style="font-size:32px;">${sysData.times.medium}</span>`;
    } else {
        resultBox.style.backgroundColor = "rgba(46, 204, 113, 0.2)";
        resultBox.style.color = "#1e7e34";
        severityResult.innerText = "🟢 LOW";
        descResult.innerText = "เสียหายน้อยมาก / พบความผิดปกติ (< 5%)";
        timeResult.innerHTML = `⏱️ <b>ระยะเวลาแก้ไขปัญหา (SLA):</b> <br><span style="font-size:32px;">${sysData.times.low}</span>`;
    }
}
</script>

</body>
</html>
